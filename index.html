<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>🍱 메뉴 결정 파괴기 V2</title>
    <style>
        :root { --primary: #ff4757; --dark: #121212; --card: #1e1e1e; --text: #ffffff; --accent: #00d3a5; }
        body { background: var(--dark); color: var(--text); font-family: 'Pretendard', -apple-system, sans-serif; margin: 0; display: flex; flex-direction: column; align-items: center; justify-content: center; min-height: 100vh; overflow: hidden; }
        
        .container { text-align: center; width: 90%; max-width: 400px; padding: 20px; border-radius: 30px; background: var(--card); box-shadow: 0 20px 50px rgba(0,0,0,0.5); border: 1px solid #333; }
        h1 { font-size: 1.8rem; color: var(--primary); margin-bottom: 10px; text-shadow: 0 0 15px rgba(255, 71, 87, 0.4); }
        .sub-title { color: #888; font-size: 0.9rem; margin-bottom: 30px; }

        .roulette-box { position: relative; width: 280px; height: 180px; margin: 0 auto 30px; border: 4px solid #333; border-radius: 20px; display: flex; align-items: center; justify-content: center; background: #000; box-shadow: inset 0 0 20px rgba(255, 71, 87, 0.2); overflow: hidden; }
        #display-menu { font-size: 1.6rem; font-weight: 900; color: var(--primary); text-align: center; padding: 0 15px; line-height: 1.4; word-break: keep-all; }

        .btn-roll { width: 100%; padding: 22px; background: linear-gradient(45deg, var(--primary), #ff6b81); color: white; border: none; border-radius: 18px; font-size: 1.5rem; font-weight: 900; cursor: pointer; transition: 0.2s; box-shadow: 0 8px 20px rgba(255, 71, 87, 0.3); }
        .btn-roll:active { transform: scale(0.96); box-shadow: 0 2px 10px rgba(255, 71, 87, 0.2); }
        .btn-roll:disabled { background: #555; cursor: not-allowed; box-shadow: none; }

        .result-msg { margin-top: 25px; font-size: 1.1rem; color: var(--accent); height: 1.5rem; font-weight: 600; }

        .donation-btn { position: fixed; bottom: 25px; right: 25px; background: #1e1e1e; color: var(--accent); padding: 14px 22px; border: 2px solid var(--accent); border-radius: 50px; font-weight: 800; cursor: pointer; display: flex; align-items: center; gap: 10px; box-shadow: 0 10px 20px rgba(0,0,0,0.4); transition: 0.3s; z-index: 100; }
        .donation-btn:hover { background: var(--accent); color: #000; transform: translateY(-3px); }
    </style>
</head>
<body>

    <div class="container">
        <h1>🍱 메뉴 결정 파괴기 V2</h1>
        <div class="sub-title">오늘의 점심 운명을 AI(? )에게 맡기십쇼</div>
        
        <div class="roulette-box">
            <div id="display-menu">무엇을 먹을까?</div>
        </div>

        <button id="roll-button" class="btn-roll" onclick="roll()">메뉴 결정 가즈아!</button>
        
        <div id="result-msg" class="result-msg"></div>
    </div>

    <button class="donation-btn" onclick="copyAccount()">
        <span>☕</span> 커피 수혈하기
    </button>

    <script>
        const menus = [
            "제육볶음 (진리의 점심)", "뼈해장국 (어허 시원하다)", "돼지국밥 (정구지 팍팍)", "김치찌개", "된장찌개", "순두부찌개", "비빔밥", "불고기 백반", "청국장 (냄새 주의)", "콩나물국밥",
            "간짜장 (계란후라이 필수)", "짬뽕 (해장용)", "탕수육 찍먹", "돈까스 (소울푸드)", "텐동", "초밥 세트", "라멘", "햄버거 (버거킹급)", "피자 (1인 1판)", "까르보나라",
            "떡튀순 세트", "라면에 김밥", "편의점 도시락", "서브웨이 (야채 다 넣고)", "잔치국수", "냉면", "로또 사고 굶기",
            "강제 단식(꽝) - 코딩해!", "삼각김밥 1개 (눈물 젖은)", "전투 식량 (고구려 기상)", "상사 입맛 따라가기", "법카 찬스! (소고기)", "얻어먹기 (후배 찬스)", "옆 사람 한 입만!", "다이어트 닭가슴살", "직접 해먹기", "탕후루 (당 보충)", "냉수 한 사발", "먹고 싶은 거 아무거나!"
        ];

        const funMsgs = ["군말 말고 이거 드십쇼!", "오늘의 운명입니다, 형님.", "이거 먹고 오후 코딩 빡세게 가시죠!", "메뉴 고를 시간에 한 입 더 먹겠습니다.", "침 고이네요... 한 입만 주십쇼."];
        
        let isRolling = false;

        function roll() {
            if (isRolling) return;
            const display = document.getElementById('display-menu');
            const msg = document.getElementById('result-msg');
            const btn = document.getElementById('roll-button');
            isRolling = true;
            btn.disabled = true;
            msg.innerText = "운명을 섞는 중...";
            let counter = 0;
            const interval = setInterval(() => {
                display.innerText = menus[Math.floor(Math.random() * menus.length)];
                counter++;
                if (counter > 40) {
                    clearInterval(interval);
                    isRolling = false;
                    btn.disabled = false;
                    msg.innerText = funMsgs[Math.floor(Math.random() * funMsgs.length)];
                }
            }, 60);
        }

        function copyAccount() {
            // 🚨 형님! 여기에 케이뱅크 계좌번호만 딱 넣으시면 됩니다.
            const acc = "케이뱅크 100-210-317446";
            navigator.clipboard.writeText(acc);
            alert("형님! 계좌번호가 복사됐습니다. 커피 잘 마시겠습니다!\n\n" + acc);
        }
    </script>
</body>
</html>
